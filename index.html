<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaxReady — Free Tax Estimate & Accountant Matching</title>
  <meta name="robots" content="noindex">
  <style>body{margin:0;background:#1a0a2e;}</style>
  <script>
    (function () {
      // If already on a country path, do nothing
      var p = window.location.pathname;
      if (p.startsWith('/uk/') || p.startsWith('/au/')) return;

      // Check localStorage cache first (avoid repeated API calls)
      var stored = localStorage.getItem('tx_country');
      if (stored === 'au' || stored === 'uk') {
        window.location.replace('/' + stored + '/');
        return;
      }

      // Fallback: redirect to /uk/ after 1.5 s if GeoTargetly hasn't fired
      var fallback = setTimeout(function () {
        localStorage.setItem('tx_country', 'uk');
        window.location.replace('/uk/');
      }, 1500);

      // GeoTargetly callback
      window.gtCallback = function (geo) {
        clearTimeout(fallback);
        var cc = (geo && geo.country_code) || '';
        // Supported countries: AU → au, everything else → uk
        // Add more mappings here as new countries launch, e.g.: cc === 'CA' ? 'ca' :
        var country = cc === 'AU' ? 'au' : 'uk';
        localStorage.setItem('tx_country', country);
        window.location.replace('/' + country + '/');
      };
    })();
  </script>
  <!-- GeoTargetly: replace GT-XXXXXXXX with your real account ID -->
  <script src="//cdn.geotargetly.com/gt.js?id=GT-XXXXXXXX&callback=gtCallback" async></script>
</head>
<body></body>
</html>
